<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Graphyard Login</title>
  <style>
    :root {
      --bg-1: #f8fafc;
      --bg-2: #dbeafe;
      --bg-3: #c7d2fe;
      --text: #0f172a;
      --muted: #475569;
      --border: #cbd5e1;
      --accent: #1d4ed8;
      --accent-hover: #1e40af;
      --danger-bg: #fef2f2;
      --danger-border: #fecaca;
      --danger-text: #991b1b;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif;
      color: var(--text);
      background: linear-gradient(145deg, var(--bg-1) 0%, var(--bg-2) 55%, var(--bg-3) 100%);
    }
    .card {
      width: min(420px, calc(100vw - 2rem));
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.12);
      padding: 1.35rem;
    }
    h1 {
      margin: 0 0 0.4rem;
      font-size: 1.25rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    p {
      margin: 0 0 1rem;
      color: var(--muted);
    }
    .errorlist {
      list-style: none;
      margin: 0 0 0.75rem;
      padding: 0.55rem 0.65rem;
      border: 1px solid var(--danger-border);
      border-radius: 8px;
      background: var(--danger-bg);
      color: var(--danger-text);
      font-size: 0.95rem;
    }
    label {
      display: block;
      margin: 0.7rem 0 0.28rem;
      font-size: 0.92rem;
      color: var(--muted);
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--border);
      border-radius: 8px;
      font: inherit;
      padding: 0.55rem 0.6rem;
      background: #fff;
    }
    button {
      margin-top: 0.9rem;
      width: 100%;
      border: 0;
      border-radius: 9px;
      font: inherit;
      color: #fff;
      background: var(--accent);
      padding: 0.62rem 0.65rem;
      cursor: pointer;
    }
    button:hover {
      background: var(--accent-hover);
    }
  </style>
</head>
<body>
<main class="card">
  <h1>Graphyard</h1>
  <p>Sign in to view hosts, services, and Grafana links.</p>

  {% if form.non_field_errors %}
    {{ form.non_field_errors }}
  {% endif %}

  <form method="post" action="{% url 'graphyard:login' %}">
    {% csrf_token %}
    <label for="{{ form.username.id_for_label }}">Username</label>
    {{ form.username }}

    <label for="{{ form.password.id_for_label }}">Password</label>
    {{ form.password }}

    {% if next %}
      <input type="hidden" name="next" value="{{ next }}">
    {% endif %}
    <button type="submit">Sign in</button>
  </form>
</main>
</body>
</html>
